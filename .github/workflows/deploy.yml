name: Build & Deploy to GitHub Pages

# Triggers on every push to main, and allows manual trigger from Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to commit docs/ back to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout full history so we can commit back
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2 ── Set up Node 20 with npm cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      # 3 ── Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: portfolio

      # 4 ── Build — env vars injected from GitHub Secrets
      - name: Build Vite app
        run: npm run build
        working-directory: portfolio
        env:
          VITE_SUPABASE_URL:        ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:   ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_EMAILJS_SERVICE_ID:  ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY:  ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      # 5 ── Copy dist → docs/ (GitHub Pages serves from main/docs)
      - name: Copy build output to docs/
        run: |
          rm -rf docs
          cp -r portfolio/dist docs

      # 6 ── Commit and push docs/ to main  ([skip ci] prevents loop)
      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: deploy $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
